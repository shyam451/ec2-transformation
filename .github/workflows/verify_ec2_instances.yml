name: Verify EC2 Instances Status

on:
  workflow_dispatch:
  push:
    branches:
      - devin/1743779809-migrate-state-auto
    paths:
      - '.github/workflows/verify_ec2_instances.yml'

permissions:
  contents: read
  id-token: write

jobs:
  verify_ec2:
    name: Verify EC2 Instances Status
    runs-on: ubuntu-latest
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::641002720432:role/ec2-role
        aws-region: us-east-1
        
    - name: List All EC2 Instances
      run: |
        echo "Listing all EC2 instances in the account..."
        aws ec2 describe-instances \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,Type:InstanceType,LaunchTime:LaunchTime,Name:Tags[?Key=='Name']|[0].Value}" \
          --output table
          
    - name: Check Autoscaling Groups
      run: |
        echo "Checking autoscaling groups..."
        aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[*].{Name:AutoScalingGroupName,MinSize:MinSize,MaxSize:MaxSize,DesiredCapacity:DesiredCapacity,Instances:Instances[*].{Id:InstanceId,State:LifecycleState}}" \
          --output table
          
    - name: Check EC2 Instances in ASG
      run: |
        echo "Checking EC2 instances in autoscaling group..."
        ASG_NAMES=$(aws autoscaling describe-auto-scaling-groups --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].AutoScalingGroupName" --output text)
        
        for ASG_NAME in $ASG_NAMES; do
          echo "Found ASG: $ASG_NAME"
          aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query "AutoScalingGroups[*].{Name:AutoScalingGroupName,Instances:Instances[*].{Id:InstanceId,State:LifecycleState,AZ:AvailabilityZone,Health:HealthStatus}}" \
            --output table
        done
        
    - name: Verify Running Instances
      run: |
        echo "Verifying running instances..."
        RUNNING_INSTANCES=$(aws ec2 describe-instances \
          --filters "Name=instance-state-name,Values=running" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text)
          
        if [ -z "$RUNNING_INSTANCES" ]; then
          echo "No running EC2 instances found."
          exit 1
        else
          echo "Found running EC2 instances: $RUNNING_INSTANCES"
          
          # Get detailed information about running instances
          aws ec2 describe-instances \
            --instance-ids $RUNNING_INSTANCES \
            --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,Type:InstanceType,LaunchTime:LaunchTime,PublicIP:PublicIpAddress,PrivateIP:PrivateIpAddress,Name:Tags[?Key=='Name']|[0].Value}" \
            --output table
        fi
