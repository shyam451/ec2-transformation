name: Fix ASG Launch Issues

on:
  workflow_dispatch:
  push:
    branches:
      - devin/1743779809-migrate-state-auto
    paths:
      - '.github/workflows/fix_asg_launch.yml'

permissions:
  contents: read
  id-token: write

jobs:
  fix_asg:
    name: Fix ASG Launch Issues
    runs-on: ubuntu-latest
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::641002720432:role/ec2-role
        aws-region: us-east-1
        
    - name: Check Launch Template
      run: |
        echo "Checking launch templates..."
        aws ec2 describe-launch-templates \
          --query "LaunchTemplates[*].{Id:LaunchTemplateId,Name:LaunchTemplateName,Version:LatestVersionNumber,Created:CreateTime}" \
          --output table
          
    - name: Check Launch Template Versions
      run: |
        echo "Checking launch template versions..."
        TEMPLATE_IDS=$(aws ec2 describe-launch-templates \
          --query "LaunchTemplates[?contains(LaunchTemplateName, 'ec2-transformation')].LaunchTemplateId" \
          --output text)
          
        for TEMPLATE_ID in $TEMPLATE_IDS; do
          echo "Checking versions for template: $TEMPLATE_ID"
          aws ec2 describe-launch-template-versions \
            --launch-template-id $TEMPLATE_ID \
            --query "LaunchTemplateVersions[*].{Version:VersionNumber,Default:DefaultVersion,UserData:LaunchTemplateData.UserData,ImageId:LaunchTemplateData.ImageId,InstanceType:LaunchTemplateData.InstanceType,SecurityGroups:LaunchTemplateData.SecurityGroupIds}" \
            --output table
        done
        
    - name: Check Security Groups
      run: |
        echo "Checking security groups..."
        aws ec2 describe-security-groups \
          --query "SecurityGroups[?contains(GroupName, 'ec2-transformation')].{Id:GroupId,Name:GroupName,VpcId:VpcId,Description:Description}" \
          --output table
          
    - name: Check Subnets
      run: |
        echo "Checking subnets..."
        aws ec2 describe-subnets \
          --query "Subnets[*].{Id:SubnetId,VpcId:VpcId,AZ:AvailabilityZone,CIDR:CidrBlock,State:State}" \
          --output table
          
    - name: Check AMIs
      run: |
        echo "Checking AMIs..."
        aws ec2 describe-images \
          --owners amazon \
          --filters "Name=name,Values=amzn2-ami-hvm-*-x86_64-gp2" "Name=state,Values=available" \
          --query "sort_by(Images, &CreationDate)[-1].{Id:ImageId,Name:Name,Created:CreationDate}" \
          --output table
          
    - name: Create New Launch Template
      run: |
        echo "Creating new launch template..."
        
        # Get latest Amazon Linux 2 AMI
        AMI_ID=$(aws ec2 describe-images \
          --owners amazon \
          --filters "Name=name,Values=amzn2-ami-hvm-*-x86_64-gp2" "Name=state,Values=available" \
          --query "sort_by(Images, &CreationDate)[-1].ImageId" \
          --output text)
          
        # Get default VPC ID
        VPC_ID=$(aws ec2 describe-vpcs \
          --filters "Name=isDefault,Values=true" \
          --query "Vpcs[0].VpcId" \
          --output text)
          
        # Create security group
        SG_ID=$(aws ec2 create-security-group \
          --group-name "ec2-transformation-sg-$(date +%s)" \
          --description "Security group for EC2 instances in ASG" \
          --vpc-id "$VPC_ID" \
          --query "GroupId" \
          --output text)
          
        # Add ingress rules
        aws ec2 authorize-security-group-ingress \
          --group-id "$SG_ID" \
          --protocol tcp \
          --port 22 \
          --cidr 0.0.0.0/0
          
        aws ec2 authorize-security-group-ingress \
          --group-id "$SG_ID" \
          --protocol tcp \
          --port 80 \
          --cidr 0.0.0.0/0
          
        # Add egress rule
        aws ec2 authorize-security-group-egress \
          --group-id "$SG_ID" \
          --protocol all \
          --port all \
          --cidr 0.0.0.0/0
          
        # Create user data
        USER_DATA=$(echo -n "#!/bin/bash
echo \"Hello from EC2 instance in ASG\" > /tmp/hello.txt
yum update -y
yum install -y httpd
systemctl start httpd
systemctl enable httpd
echo \"<h1>Hello World from $(hostname -f)</h1>\" > /var/www/html/index.html" | base64)
        
        # Create launch template
        aws ec2 create-launch-template \
          --launch-template-name "ec2-transformation-lt-$(date +%s)" \
          --version-description "Initial version" \
          --launch-template-data "{
            \"ImageId\": \"$AMI_ID\",
            \"InstanceType\": \"t2.micro\",
            \"SecurityGroupIds\": [\"$SG_ID\"],
            \"UserData\": \"$USER_DATA\",
            \"TagSpecifications\": [{
              \"ResourceType\": \"instance\",
              \"Tags\": [{
                \"Key\": \"Name\",
                \"Value\": \"ec2-transformation-instance\"
              }]
            }]
          }"
          
    - name: Update ASG with New Launch Template
      run: |
        echo "Updating ASG with new launch template..."
        
        # Get latest launch template
        LAUNCH_TEMPLATE=$(aws ec2 describe-launch-templates \
          --query "sort_by(LaunchTemplates[?contains(LaunchTemplateName, 'ec2-transformation-lt')], &CreateTime)[-1].{Id:LaunchTemplateId,Name:LaunchTemplateName}" \
          --output json)
          
        TEMPLATE_ID=$(echo $LAUNCH_TEMPLATE | jq -r '.Id')
        TEMPLATE_NAME=$(echo $LAUNCH_TEMPLATE | jq -r '.Name')
        
        echo "Using launch template: $TEMPLATE_NAME ($TEMPLATE_ID)"
        
        # Get ASG names
        ASG_NAMES=$(aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].AutoScalingGroupName" \
          --output text)
        
        # Update each ASG
        for ASG_NAME in $ASG_NAMES; do
          echo "Updating ASG: $ASG_NAME with launch template: $TEMPLATE_ID"
          
          # Get subnet IDs from default VPC
          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --query "Vpcs[0].VpcId" --output text)" \
            --query "Subnets[*].SubnetId" \
            --output json | jq -c .)
          
          # Update ASG with new launch template and subnets
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "$ASG_NAME" \
            --min-size 1 \
            --max-size 3 \
            --desired-capacity 2 \
            --vpc-zone-identifier $(aws ec2 describe-subnets \
              --filters "Name=vpc-id,Values=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --query "Vpcs[0].VpcId" --output text)" \
              --query "Subnets[*].SubnetId" \
              --output text | tr '\t' ',') \
            --launch-template "{\"LaunchTemplateId\":\"$TEMPLATE_ID\",\"Version\":\"\$Latest\"}"
            
          echo "Updated ASG: $ASG_NAME"
        done
        
    - name: Wait for instances to launch (3 minutes)
      run: |
        echo "Waiting for instances to launch (3 minutes)..."
        sleep 180
        
    - name: Check EC2 Instances
      run: |
        echo "Checking EC2 instances..."
        aws ec2 describe-instances \
          --filters "Name=instance-state-name,Values=running,pending" \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,Type:InstanceType,LaunchTime:LaunchTime,Name:Tags[?Key=='Name']|[0].Value}" \
          --output table
          
    - name: Check ASG Status
      run: |
        echo "Checking ASG status..."
        aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[*].{Name:AutoScalingGroupName,MinSize:MinSize,MaxSize:MaxSize,DesiredCapacity:DesiredCapacity,Instances:Instances[*].{Id:InstanceId,State:LifecycleState,AZ:AvailabilityZone,Health:HealthStatus}}" \
          --output table
