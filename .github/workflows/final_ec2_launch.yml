name: Final EC2 Launch and Verification

on:
  workflow_dispatch:
  push:
    branches:
      - devin/1743779809-migrate-state-auto
    paths:
      - '.github/workflows/final_ec2_launch.yml'

permissions:
  contents: read
  id-token: write

jobs:
  launch_ec2:
    name: Launch EC2 Instances and Verify
    runs-on: ubuntu-latest
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::641002720432:role/ec2-role
        aws-region: us-east-1
        
    - name: Cancel Any Existing Instance Refreshes
      run: |
        echo "Cancelling any existing instance refreshes..."
        ASG_NAMES=$(aws autoscaling describe-auto-scaling-groups --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].AutoScalingGroupName" --output text)
        
        for ASG_NAME in $ASG_NAMES; do
          REFRESH_IDS=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "$ASG_NAME" \
            --query "InstanceRefreshes[?Status=='InProgress'].InstanceRefreshId" \
            --output text)
            
          if [ -n "$REFRESH_IDS" ]; then
            echo "Cancelling instance refresh for ASG: $ASG_NAME"
            aws autoscaling cancel-instance-refresh \
              --auto-scaling-group-name "$ASG_NAME"
            echo "Cancelled instance refresh for ASG: $ASG_NAME"
          fi
        done
        
    - name: Update ASG Configuration
      run: |
        echo "Updating ASG configuration..."
        
        # Get ASG names
        ASG_NAMES=$(aws autoscaling describe-auto-scaling-groups --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].AutoScalingGroupName" --output text)
        
        # Update each ASG
        for ASG_NAME in $ASG_NAMES; do
          echo "Updating configuration for ASG: $ASG_NAME"
          
          # Update min size to 1, max size to 3, and desired capacity to 2
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "$ASG_NAME" \
            --min-size 1 \
            --max-size 3 \
            --desired-capacity 2
            
          echo "Updated ASG: $ASG_NAME with min-size=1, max-size=3, and desired-capacity=2"
        done
        
    - name: Wait for instances to launch (3 minutes)
      run: |
        echo "Waiting for instances to launch (3 minutes)..."
        sleep 180
        
    - name: Check EC2 Instances
      run: |
        echo "Checking EC2 instances..."
        aws ec2 describe-instances \
          --filters "Name=instance-state-name,Values=running,pending" \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,Type:InstanceType,LaunchTime:LaunchTime,Name:Tags[?Key=='Name']|[0].Value}" \
          --output table
          
    - name: Check ASG Status
      run: |
        echo "Checking ASG status..."
        aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[*].{Name:AutoScalingGroupName,MinSize:MinSize,MaxSize:MaxSize,DesiredCapacity:DesiredCapacity,Instances:Instances[*].{Id:InstanceId,State:LifecycleState,AZ:AvailabilityZone,Health:HealthStatus}}" \
          --output table
          
    - name: Verify EC2 Instances in ASG
      run: |
        echo "Verifying EC2 instances in ASG..."
        ASG_NAMES=$(aws autoscaling describe-auto-scaling-groups --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].AutoScalingGroupName" --output text)
        
        for ASG_NAME in $ASG_NAMES; do
          echo "Found ASG: $ASG_NAME"
          aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query "AutoScalingGroups[*].{Name:AutoScalingGroupName,Instances:Instances[*].{Id:InstanceId,State:LifecycleState,AZ:AvailabilityZone,Health:HealthStatus}}" \
            --output table
        done
        
    - name: Check Instance Details
      run: |
        echo "Checking instance details..."
        INSTANCE_IDS=$(aws ec2 describe-instances \
          --filters "Name=instance-state-name,Values=running,pending" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text)
          
        if [ -z "$INSTANCE_IDS" ]; then
          echo "No running EC2 instances found."
          exit 1
        else
          echo "Found running EC2 instances: $INSTANCE_IDS"
          
          # Get detailed information about running instances
          aws ec2 describe-instances \
            --instance-ids $INSTANCE_IDS \
            --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,Type:InstanceType,LaunchTime:LaunchTime,PublicIP:PublicIpAddress,PrivateIP:PrivateIpAddress,Name:Tags[?Key=='Name']|[0].Value}" \
            --output table
        fi
