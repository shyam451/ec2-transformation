name: Update ASG Capacity Final

on:
  push:
    branches:
      - devin/1743779809-migrate-state-auto
    paths:
      - '.github/workflows/update_asg_capacity_final.yml'

permissions:
  contents: read
  id-token: write

jobs:
  update_asg:
    name: Update ASG Capacity and Check Instances
    runs-on: ubuntu-latest
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::641002720432:role/ec2-role
        aws-region: us-east-1
        
    - name: Check Current ASG Status
      run: |
        echo "Checking current ASG status..."
        aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[*].{Name:AutoScalingGroupName,MinSize:MinSize,MaxSize:MaxSize,DesiredCapacity:DesiredCapacity,Instances:Instances[*].{Id:InstanceId,State:LifecycleState}}" \
          --output table
          
    - name: Update ASG Capacity
      run: |
        echo "Updating ASG capacity..."
        
        # Update the first ASG
        aws autoscaling update-auto-scaling-group \
          --auto-scaling-group-name "ec2-transformation-asg" \
          --min-size 1 \
          --max-size 3 \
          --desired-capacity 2
          
        echo "Updated ec2-transformation-asg with min-size=1, max-size=3, and desired-capacity=2"
        
        # Update the second ASG
        aws autoscaling update-auto-scaling-group \
          --auto-scaling-group-name "ec2-transformation-asg-20250404151725558800000004" \
          --min-size 1 \
          --max-size 3 \
          --desired-capacity 2
          
        echo "Updated ec2-transformation-asg-20250404151725558800000004 with min-size=1, max-size=3, and desired-capacity=2"
        
    - name: Wait for instances to launch (3 minutes)
      run: |
        echo "Waiting for instances to launch (3 minutes)..."
        sleep 180
        
    - name: Check EC2 Instances
      run: |
        echo "Checking EC2 instances..."
        aws ec2 describe-instances \
          --filters "Name=instance-state-name,Values=running,pending" \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,Type:InstanceType,LaunchTime:LaunchTime,Name:Tags[?Key=='Name']|[0].Value}" \
          --output table
          
    - name: Check ASG Status After Update
      run: |
        echo "Checking ASG status after update..."
        aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[*].{Name:AutoScalingGroupName,MinSize:MinSize,MaxSize:MaxSize,DesiredCapacity:DesiredCapacity,Instances:Instances[*].{Id:InstanceId,State:LifecycleState,AZ:AvailabilityZone,Health:HealthStatus}}" \
          --output table
