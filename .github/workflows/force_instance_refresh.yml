name: Force ASG Instance Refresh

on:
  workflow_dispatch:
  push:
    branches:
      - devin/1743779809-migrate-state-auto
    paths:
      - '.github/workflows/force_instance_refresh.yml'

permissions:
  contents: read
  id-token: write

jobs:
  refresh_instances:
    name: Force ASG Instance Refresh
    runs-on: ubuntu-latest
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::641002720432:role/ec2-role
        aws-region: us-east-1
        
    - name: Start Instance Refresh
      run: |
        echo "Starting instance refresh for ASGs..."
        
        # Get ASG names
        ASG_NAMES=$(aws autoscaling describe-auto-scaling-groups --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].AutoScalingGroupName" --output text)
        
        # Start refresh for each ASG
        for ASG_NAME in $ASG_NAMES; do
          echo "Starting instance refresh for ASG: $ASG_NAME"
          
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 300}'
            
          echo "Instance refresh started for ASG: $ASG_NAME"
        done
        
    - name: Wait for instances to launch
      run: |
        echo "Waiting for instances to launch..."
        sleep 120
        
    - name: Check Autoscaling Groups
      run: |
        echo "Checking autoscaling groups..."
        aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[*].{Name:AutoScalingGroupName,MinSize:MinSize,MaxSize:MaxSize,DesiredCapacity:DesiredCapacity,Instances:Instances[*].{Id:InstanceId,State:LifecycleState}}" \
          --output table
          
    - name: List All EC2 Instances
      run: |
        echo "Listing all EC2 instances in the account..."
        aws ec2 describe-instances \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,Type:InstanceType,LaunchTime:LaunchTime,Name:Tags[?Key=='Name']|[0].Value}" \
          --output table
