name: Export Terraform State to S3

on:
  workflow_dispatch:
  push:
    branches:
      - devin/1743646842-ec2-asg-lambda
    paths:
      - '.github/workflows/export_state_to_s3.yml'

permissions:
  contents: read
  id-token: write

jobs:
  export_state:
    name: Export State to S3 and Run Plan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::641002720432:role/ec2-role
        aws-region: us-east-1
        
    - name: Create Backend Resources
      run: |
        echo "Creating S3 bucket for Terraform state..."
        aws s3api create-bucket \
          --bucket ec2-transformation-terraform-state \
          --region us-east-1 || echo "Bucket may already exist"
          
        echo "Enabling versioning on S3 bucket..."
        aws s3api put-bucket-versioning \
          --bucket ec2-transformation-terraform-state \
          --versioning-configuration Status=Enabled || echo "Versioning may already be enabled"
          
        echo "Enabling encryption on S3 bucket..."
        aws s3api put-bucket-encryption \
          --bucket ec2-transformation-terraform-state \
          --server-side-encryption-configuration '{
            "Rules": [
              {
                "ApplyServerSideEncryptionByDefault": {
                  "SSEAlgorithm": "AES256"
                }
              }
            ]
          }' || echo "Encryption may already be configured"
          
        echo "Creating DynamoDB table for Terraform state locking..."
        aws dynamodb create-table \
          --table-name ec2-transformation-terraform-locks \
          --attribute-definitions AttributeName=LockID,AttributeType=S \
          --key-schema AttributeName=LockID,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST || echo "Table may already exist"
          
    - name: Verify Resources
      run: |
        echo "Verifying S3 bucket..."
        aws s3api head-bucket --bucket ec2-transformation-terraform-state || exit 1
        
        echo "Verifying DynamoDB table..."
        aws dynamodb describe-table --table-name ec2-transformation-terraform-locks || exit 1
        
    - name: Uncomment Backend Configuration
      run: |
        echo "Uncommenting backend configuration..."
        sed -i 's/# backend/backend/g' backend.tf
        sed -i 's/#   /  /g' backend.tf
        cat backend.tf
        
    - name: Initialize Terraform with State Migration
      run: |
        echo "Initializing Terraform with state migration..."
        terraform init -migrate-state -force-copy
        
    - name: Run Terraform Plan
      run: |
        echo "Running terraform plan to check for deviations..."
        terraform plan -out=tfplan
        
    - name: Show Plan Summary
      run: |
        echo "Plan summary:"
        terraform show -no-color tfplan | grep -A 20 "Plan:"
