name: Unlock Terraform State

on:
  workflow_dispatch:
  push:
    branches:
      - devin/1743779809-migrate-state-auto
    paths:
      - '.github/workflows/unlock_state.yml'

permissions:
  contents: read
  id-token: write

jobs:
  unlock_state:
    name: Unlock State and Migrate to S3
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::641002720432:role/ec2-role
        aws-region: us-east-1
        
    - name: Verify Backend Resources
      run: |
        echo "Verifying S3 bucket..."
        aws s3api head-bucket --bucket ec2-transformation-terraform-state || exit 1
        
        echo "Verifying DynamoDB table..."
        aws dynamodb describe-table --table-name ec2-transformation-terraform-locks || exit 1
        
    - name: Force Unlock State
      run: |
        echo "Force unlocking state..."
        terraform init
        terraform force-unlock -force 257eeb5b-285b-994f-5b0a-131ca9c936f8
        
    - name: Initialize Terraform with State Migration
      run: |
        echo "Initializing Terraform with state migration..."
        terraform init -migrate-state -force-copy
        
    - name: Run Terraform Plan
      run: |
        echo "Running terraform plan to check for deviations..."
        terraform plan -out=tfplan
        
    - name: Show Plan Summary
      run: |
        echo "Plan summary:"
        terraform show -no-color tfplan | grep -A 20 "Plan:"
