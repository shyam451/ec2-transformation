name: Direct ASG Update Final

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  update_asg:
    name: Update ASG Configuration
    runs-on: ubuntu-latest
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::641002720432:role/ec2-role
        aws-region: us-east-1
        
    - name: List ASGs
      id: list_asgs
      run: |
        echo "Listing Auto Scaling Groups..."
        aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].{Name:AutoScalingGroupName,MinSize:MinSize,MaxSize:MaxSize,DesiredCapacity:DesiredCapacity}" \
          --output table
          
        # Store ASG names for later use
        ASG_NAMES=$(aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].AutoScalingGroupName" \
          --output text)
          
        echo "ASG_NAMES<<EOF" >> $GITHUB_ENV
        echo "$ASG_NAMES" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
        
    - name: Update ASG Configuration
      run: |
        if [ -z "$ASG_NAMES" ]; then
          echo "No ASGs found with 'ec2-transformation' in the name."
          exit 1
        fi
        
        # Update each ASG
        for ASG_NAME in $ASG_NAMES; do
          echo "Updating ASG: $ASG_NAME"
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "$ASG_NAME" \
            --min-size 3 \
            --max-size 5 \
            --desired-capacity 3
        done
        
    - name: Verify ASG Configuration
      run: |
        echo "Verifying ASG configuration..."
        aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].{Name:AutoScalingGroupName,MinSize:MinSize,MaxSize:MaxSize,DesiredCapacity:DesiredCapacity}" \
          --output table
