name: Final Direct EC2 Creation

on:
  workflow_dispatch:
  push:
    branches:
      - devin/final-ec2-creation
    paths:
      - '.github/workflows/final_direct_ec2_creation.yml'

permissions:
  contents: read
  id-token: write

jobs:
  create_ec2:
    name: Create EC2 Instances Directly
    runs-on: ubuntu-latest
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::641002720432:role/ec2-role
        aws-region: us-east-1
        
    - name: Create EC2 Instances
      run: |
        echo "Creating EC2 instances directly..."
        
        # Get default VPC ID
        VPC_ID=$(aws ec2 describe-vpcs \
          --filters "Name=isDefault,Values=true" \
          --query "Vpcs[0].VpcId" \
          --output text)
          
        echo "Using VPC: $VPC_ID"
        
        # Create security group
        SG_ID=$(aws ec2 create-security-group \
          --group-name "ec2-final-sg-$(date +%s)" \
          --description "Security group for final EC2 instances" \
          --vpc-id "$VPC_ID" \
          --query "GroupId" \
          --output text)
          
        echo "Created security group: $SG_ID"
        
        # Add security group rules
        aws ec2 authorize-security-group-ingress \
          --group-id "$SG_ID" \
          --protocol tcp \
          --port 22 \
          --cidr 0.0.0.0/0
          
        aws ec2 authorize-security-group-ingress \
          --group-id "$SG_ID" \
          --protocol tcp \
          --port 80 \
          --cidr 0.0.0.0/0
          
        aws ec2 authorize-security-group-egress \
          --group-id "$SG_ID" \
          --protocol all \
          --port all \
          --cidr 0.0.0.0/0
          
        echo "Security group rules added"
        
        # Get latest Amazon Linux 2 AMI
        AMI_ID=$(aws ec2 describe-images \
          --owners amazon \
          --filters "Name=name,Values=amzn2-ami-hvm-*-x86_64-gp2" "Name=state,Values=available" \
          --query "sort_by(Images, &CreationDate)[-1].ImageId" \
          --output text)
          
        echo "Using AMI: $AMI_ID"
        
        # Get subnet ID
        SUBNET_ID=$(aws ec2 describe-subnets \
          --filters "Name=vpc-id,Values=$VPC_ID" \
          --query "Subnets[0].SubnetId" \
          --output text)
          
        echo "Using subnet: $SUBNET_ID"
        
        # Create user data script
        cat > user-data.sh << 'EOF'
#!/bin/bash
echo "Hello from EC2 instance" > /tmp/hello.txt
yum update -y
yum install -y httpd
systemctl start httpd
systemctl enable httpd
echo "<h1>Hello World from $(hostname -f)</h1>" > /var/www/html/index.html
EOF
        
        # Create EC2 instances
        INSTANCE_IDS=$(aws ec2 run-instances \
          --image-id "$AMI_ID" \
          --instance-type t2.micro \
          --count 2 \
          --security-group-ids "$SG_ID" \
          --subnet-id "$SUBNET_ID" \
          --user-data file://user-data.sh \
          --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=ec2-transformation-final}]" \
          --query "Instances[*].InstanceId" \
          --output text)
          
        echo "Created instances: $INSTANCE_IDS"
        echo "INSTANCE_IDS=$INSTANCE_IDS" >> $GITHUB_ENV
        
    - name: Wait for instances to be running (2 minutes)
      run: |
        echo "Waiting for instances to be running (2 minutes)..."
        sleep 120
        
    - name: Check EC2 Instances
      run: |
        echo "Checking EC2 instances..."
        aws ec2 describe-instances \
          --instance-ids $INSTANCE_IDS \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,Type:InstanceType,LaunchTime:LaunchTime,PublicIP:PublicIpAddress,PrivateIP:PrivateIpAddress,Name:Tags[?Key=='Name']|[0].Value}" \
          --output table
          
    - name: Check All Running EC2 Instances
      run: |
        echo "Checking all running EC2 instances..."
        aws ec2 describe-instances \
          --filters "Name=instance-state-name,Values=running,pending" \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,Type:InstanceType,LaunchTime:LaunchTime,Name:Tags[?Key=='Name']|[0].Value}" \
          --output table
