name: Final ASG Update and EC2 Check

on:
  workflow_dispatch:
  push:
    branches:
      - devin/1743779809-migrate-state-auto
    paths:
      - '.github/workflows/final_asg_update.yml'

permissions:
  contents: read
  id-token: write

jobs:
  update_asg:
    name: Update ASG and Check EC2 Instances
    runs-on: ubuntu-latest
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::641002720432:role/ec2-role
        aws-region: us-east-1
        
    - name: Check Current ASG Status
      run: |
        echo "Checking current ASG status..."
        aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[*].{Name:AutoScalingGroupName,MinSize:MinSize,MaxSize:MaxSize,DesiredCapacity:DesiredCapacity,Instances:Instances[*].{Id:InstanceId,State:LifecycleState}}" \
          --output table
          
    - name: Update ASG Configuration
      run: |
        echo "Updating ASG configuration..."
        
        # Get ASG names
        ASG_NAMES=$(aws autoscaling describe-auto-scaling-groups --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].AutoScalingGroupName" --output text)
        
        # Update each ASG
        for ASG_NAME in $ASG_NAMES; do
          echo "Updating configuration for ASG: $ASG_NAME"
          
          # Update min size to 1 and desired capacity to 2
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "$ASG_NAME" \
            --min-size 1 \
            --max-size 3 \
            --desired-capacity 2
            
          echo "Updated ASG: $ASG_NAME with min-size=1, max-size=3, and desired-capacity=2"
        done
        
    - name: Wait for instances to launch (2 minutes)
      run: |
        echo "Waiting for instances to launch (2 minutes)..."
        sleep 120
        
    - name: Check EC2 Instances
      run: |
        echo "Checking EC2 instances..."
        aws ec2 describe-instances \
          --filters "Name=instance-state-name,Values=running,pending" \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,Type:InstanceType,LaunchTime:LaunchTime,Name:Tags[?Key=='Name']|[0].Value}" \
          --output table
          
    - name: Check ASG Status After Update
      run: |
        echo "Checking ASG status after update..."
        aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[*].{Name:AutoScalingGroupName,MinSize:MinSize,MaxSize:MaxSize,DesiredCapacity:DesiredCapacity,Instances:Instances[*].{Id:InstanceId,State:LifecycleState,AZ:AvailabilityZone,Health:HealthStatus}}" \
          --output table
          
    - name: Check Instance Refresh Status
      run: |
        echo "Checking instance refresh status..."
        ASG_NAMES=$(aws autoscaling describe-auto-scaling-groups --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].AutoScalingGroupName" --output text)
        
        for ASG_NAME in $ASG_NAMES; do
          echo "Checking instance refresh status for ASG: $ASG_NAME"
          aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "$ASG_NAME" \
            --query "InstanceRefreshes[*].{Id:InstanceRefreshId,Status:Status,StartTime:StartTime,PercentageComplete:PercentageComplete}" \
            --output table
        done
        
    - name: Cancel Instance Refresh If Needed
      run: |
        echo "Checking if we need to cancel instance refresh..."
        ASG_NAMES=$(aws autoscaling describe-auto-scaling-groups --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].AutoScalingGroupName" --output text)
        
        for ASG_NAME in $ASG_NAMES; do
          REFRESH_IDS=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "$ASG_NAME" \
            --query "InstanceRefreshes[?Status=='InProgress'].InstanceRefreshId" \
            --output text)
            
          if [ -n "$REFRESH_IDS" ]; then
            echo "Cancelling instance refresh for ASG: $ASG_NAME"
            for REFRESH_ID in $REFRESH_IDS; do
              aws autoscaling cancel-instance-refresh \
                --auto-scaling-group-name "$ASG_NAME"
              echo "Cancelled instance refresh: $REFRESH_ID"
            done
          fi
        done
        
    - name: Final EC2 Check
      run: |
        echo "Final EC2 instance check..."
        aws ec2 describe-instances \
          --filters "Name=instance-state-name,Values=running,pending" \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,Type:InstanceType,LaunchTime:LaunchTime,Name:Tags[?Key=='Name']|[0].Value}" \
          --output table
