name: Check ASG Configuration Direct

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  check_asg:
    name: Check ASG Configuration
    runs-on: ubuntu-latest
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::641002720432:role/ec2-role
        aws-region: us-east-1
        
    - name: Check ASG Configuration
      run: |
        echo "Checking Auto Scaling Group configuration..."
        aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].{Name:AutoScalingGroupName,MinSize:MinSize,MaxSize:MaxSize,DesiredCapacity:DesiredCapacity}" \
          --output table
