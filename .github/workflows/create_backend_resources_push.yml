name: Create Terraform Backend Resources on Push

on:
  push:
    branches:
      - devin/1743646842-ec2-asg-lambda
    paths:
      - '.github/workflows/create_backend_resources_push.yml'

permissions:
  contents: read
  id-token: write

jobs:
  create_backend:
    name: Create S3 Bucket and DynamoDB Table
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::641002720432:role/ec2-role
        aws-region: us-east-1
        
    - name: Create S3 Bucket
      run: |
        echo "Creating S3 bucket for Terraform state..."
        aws s3api create-bucket \
          --bucket ec2-transformation-terraform-state \
          --region us-east-1 || echo "Bucket may already exist"
          
        echo "Enabling versioning on S3 bucket..."
        aws s3api put-bucket-versioning \
          --bucket ec2-transformation-terraform-state \
          --versioning-configuration Status=Enabled
          
        echo "Enabling encryption on S3 bucket..."
        aws s3api put-bucket-encryption \
          --bucket ec2-transformation-terraform-state \
          --server-side-encryption-configuration '{
            "Rules": [
              {
                "ApplyServerSideEncryptionByDefault": {
                  "SSEAlgorithm": "AES256"
                }
              }
            ]
          }'
          
    - name: Create DynamoDB Table
      run: |
        echo "Creating DynamoDB table for Terraform state locking..."
        aws dynamodb create-table \
          --table-name ec2-transformation-terraform-locks \
          --attribute-definitions AttributeName=LockID,AttributeType=S \
          --key-schema AttributeName=LockID,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST || echo "Table may already exist"
          
    - name: Verify Resources
      run: |
        echo "Verifying S3 bucket..."
        aws s3api head-bucket --bucket ec2-transformation-terraform-state
        
        echo "Verifying DynamoDB table..."
        aws dynamodb describe-table --table-name ec2-transformation-terraform-locks
        
    - name: Run Terraform Init and Plan
      run: |
        echo "Installing Terraform..."
        wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
        sudo apt update && sudo apt install terraform
        
        echo "Initializing Terraform with S3 backend..."
        terraform init -migrate-state
        
        echo "Running Terraform plan to check for deviations..."
        terraform plan -out=tfplan
        
        echo "Showing plan summary..."
        terraform show -no-color tfplan | grep -A 20 "Plan:"
