name: Terraform Plan and Destroy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform (plan or destroy)'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - destroy

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: Terraform Plan or Destroy
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::641002720432:role/ec2-role
        aws-region: us-east-1
        
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Package Lambda Function
      if: github.event.inputs.action == 'plan'
      run: |
        cd lambda
        npm install
        chmod +x package.sh
        ./package.sh
        
    - name: Terraform Init
      run: |
        # Remove backend configuration to use local state
        rm -f backend.tf
        terraform init -input=false
      
    - name: Terraform Plan
      if: github.event.inputs.action == 'plan'
      run: terraform plan -input=false -out=tfplan
      
    - name: Terraform Plan Destroy
      if: github.event.inputs.action == 'destroy'
      run: terraform plan -destroy -input=false -out=tfdestroyplan
      
    - name: Terraform Apply
      if: github.event.inputs.action == 'plan'
      run: terraform apply -input=false -auto-approve tfplan
      
    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: terraform apply -input=false -auto-approve tfdestroyplan
      
    - name: Check Resources Status
      if: github.event.inputs.action == 'plan'
      run: |
        echo "Checking EC2 instances..."
        aws ec2 describe-instances \
          --filters "Name=instance-state-name,Values=running,pending" \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,Type:InstanceType,LaunchTime:LaunchTime,Name:Tags[?Key=='Name']|[0].Value}" \
          --output table
          
        echo "Checking ASG status..."
        aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[*].{Name:AutoScalingGroupName,MinSize:MinSize,MaxSize:MaxSize,DesiredCapacity:DesiredCapacity,Instances:Instances[*].{Id:InstanceId,State:LifecycleState,AZ:AvailabilityZone,Health:HealthStatus}}" \
          --output table
          
    - name: Verify Resources Deleted
      if: github.event.inputs.action == 'destroy'
      run: |
        echo "Verifying EC2 instances have been deleted..."
        aws ec2 describe-instances \
          --filters "Name=tag:Environment,Values=ec2-transformation" \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,State:State.Name,Type:InstanceType,LaunchTime:LaunchTime,Name:Tags[?Key=='Name']|[0].Value}" \
          --output table
          
        echo "Verifying ASG has been deleted..."
        aws autoscaling describe-auto-scaling-groups \
          --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'ec2-transformation')].{Name:AutoScalingGroupName,MinSize:MinSize,MaxSize:MaxSize,DesiredCapacity:DesiredCapacity}" \
          --output table
          
        echo "Verifying Lambda function has been deleted..."
        aws lambda list-functions \
          --query "Functions[?contains(FunctionName, 'ec2-transformation')].{Name:FunctionName,Runtime:Runtime,Memory:MemorySize}" \
          --output table
